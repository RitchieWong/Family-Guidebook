<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>分类 · 暄暄的家</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@4.2.0/fonts/remixicon.css">
  <link rel="stylesheet" href="./assets/style.css">
</head>
<body class="bg-slate-50 text-slate-800 home-body">

<!-- 顶部导航 -->
<nav class="fixed top-0 left-0 right-0 z-50 bg-white/80 backdrop-blur-md border-b border-slate-200/60">
  <div class="max-w-7xl mx-auto px-4 md:px-6 py-3 flex items-center justify-between">
    <a href="./index.html" class="flex items-center gap-2">
      <span class="w-9 h-9 rounded-xl bg-gradient-to-br from-sky-500 via-cyan-500 to-amber-400 flex items-center justify-center text-white shadow-sm">
        <i class="ri-home-heart-fill text-lg"></i>
      </span>
      <span class="font-bold text-base md:text-lg bg-gradient-to-r from-sky-600 to-amber-500 bg-clip-text text-transparent">暄暄的家</span>
    </a>
    <div id="nav-cats" class="hidden md:flex items-center gap-5 text-sm font-medium text-slate-600"></div>
    <button id="nav-toggle" class="md:hidden w-10 h-10 flex items-center justify-center rounded-lg hover:bg-slate-100 transition text-slate-700" aria-label="菜单">
      <i class="ri-menu-line text-2xl" id="nav-icon"></i>
    </button>
  </div>
  <div id="mobile-menu" class="hidden md:hidden bg-white/95 backdrop-blur-md border-t border-slate-200/60">
    <div id="mobile-nav-cats" class="px-4 py-3 grid grid-cols-3 gap-2 text-xs font-medium text-slate-700"></div>
  </div>
</nav>

<!-- 分类 Hero -->
<header id="cat-hero" class="relative pt-28 pb-16 px-6 overflow-hidden">
  <!-- 由 JS 填充 -->
</header>

<!-- 列表区 -->
<main class="max-w-7xl mx-auto px-6 py-10">

  <!-- 工具条：筛选 + 排序 + 视图 -->
  <div class="flex flex-wrap items-center gap-3 mb-8 p-4 rounded-2xl bg-white border border-slate-100 shadow-sm sticky top-[72px] z-30">

    <!-- 状态筛选 -->
    <div id="status-filters" class="flex items-center gap-1 p-1 rounded-xl bg-slate-100">
      <button data-status="all"  class="filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold bg-white shadow text-slate-700">全部</button>
      <button data-status="live" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-emerald-600">已上线</button>
      <button data-status="dev"  class="filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-amber-600">开发中</button>
      <button data-status="plan" class="filter-btn px-3 py-1.5 rounded-lg text-xs font-semibold text-slate-500">规划中</button>
    </div>

    <!-- 搜索 -->
    <div class="relative flex-1 min-w-[200px]">
      <i class="ri-search-line absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"></i>
      <input id="search-input" type="text" placeholder="搜索标题、简介、标签…"
        class="w-full pl-9 pr-3 py-2 rounded-xl border border-slate-200 bg-slate-50 text-sm focus:bg-white focus:border-sky-300 focus:outline-none focus:ring-2 focus:ring-sky-100 transition">
    </div>

    <!-- 排序 -->
    <div class="flex items-center gap-2">
      <label class="text-xs text-slate-500 hidden sm:inline">排序</label>
      <select id="sort-select" class="text-sm px-3 py-2 rounded-xl border border-slate-200 bg-white focus:outline-none focus:ring-2 focus:ring-sky-100 focus:border-sky-300 transition">
        <option value="date-desc">📅 日期 · 新 → 旧</option>
        <option value="date-asc">📅 日期 · 旧 → 新</option>
        <option value="title-asc">🔤 标题 · A → Z</option>
        <option value="title-desc">🔤 标题 · Z → A</option>
        <option value="status">✅ 按状态（已上线优先）</option>
      </select>
    </div>

    <!-- 视图切换 -->
    <div id="view-switch" class="flex items-center gap-1 p-1 rounded-xl bg-slate-100">
      <button data-view="grid" class="view-btn w-8 h-8 rounded-lg bg-white shadow text-slate-700 flex items-center justify-center" title="卡片视图"><i class="ri-grid-fill"></i></button>
      <button data-view="list" class="view-btn w-8 h-8 rounded-lg text-slate-500 hover:text-slate-700 flex items-center justify-center" title="列表视图"><i class="ri-list-check-2"></i></button>
    </div>
  </div>

  <!-- 结果数 -->
  <div id="result-meta" class="text-sm text-slate-500 mb-4"></div>

  <!-- 内容区 -->
  <div id="item-list"></div>

  <!-- 空状态 -->
  <div id="empty-state" class="hidden py-20 text-center">
    <div class="text-6xl mb-4">🌤️</div>
    <div class="text-lg font-semibold text-slate-700 mb-1">暂时没有找到内容</div>
    <div class="text-sm text-slate-500">换个筛选条件或关键词试试~</div>
  </div>
</main>

<!-- Footer -->
<footer class="mt-10 border-t border-slate-200 bg-white/60 backdrop-blur">
  <div class="max-w-7xl mx-auto px-6 py-8 flex flex-col md:flex-row items-center justify-between gap-3 text-sm text-slate-500">
    <div class="flex items-center gap-2">
      <span class="w-8 h-8 rounded-lg bg-gradient-to-br from-sky-500 via-cyan-500 to-amber-400 flex items-center justify-center text-white">
        <i class="ri-home-heart-fill"></i>
      </span>
      <span>© <span id="year"></span> 暄暄的家</span>
    </div>
    <a href="./index.html" class="inline-flex items-center gap-1 hover:text-sky-600 transition">
      <i class="ri-arrow-left-line"></i>返回首页
    </a>
  </div>
</footer>

<script src="./assets/data.js"></script>
<script>
  const ACCENT = {
    sky:     { grad: 'from-sky-500 to-cyan-500',       badgeBg: 'bg-sky-50',     badgeText: 'text-sky-600',     ring: 'hover:ring-sky-200',     solid: 'text-sky-600',     soft: 'bg-sky-50 text-sky-700' },
    amber:   { grad: 'from-amber-400 to-orange-400',   badgeBg: 'bg-amber-50',   badgeText: 'text-amber-600',   ring: 'hover:ring-amber-200',   solid: 'text-amber-600',   soft: 'bg-amber-50 text-amber-700' },
    rose:    { grad: 'from-rose-500 to-pink-500',      badgeBg: 'bg-rose-50',    badgeText: 'text-rose-600',    ring: 'hover:ring-rose-200',    solid: 'text-rose-600',    soft: 'bg-rose-50 text-rose-700' },
    emerald: { grad: 'from-emerald-500 to-teal-500',   badgeBg: 'bg-emerald-50', badgeText: 'text-emerald-600', ring: 'hover:ring-emerald-200', solid: 'text-emerald-600', soft: 'bg-emerald-50 text-emerald-700' },
    violet:  { grad: 'from-violet-500 to-fuchsia-500', badgeBg: 'bg-violet-50',  badgeText: 'text-violet-600',  ring: 'hover:ring-violet-200',  solid: 'text-violet-600',  soft: 'bg-violet-50 text-violet-700' },
    cyan:    { grad: 'from-cyan-500 to-blue-500',      badgeBg: 'bg-cyan-50',    badgeText: 'text-cyan-600',    ring: 'hover:ring-cyan-200',    solid: 'text-cyan-600',    soft: 'bg-cyan-50 text-cyan-700' }
  };
  const STATUS = {
    live: { label: '已上线', dot: 'bg-emerald-400', text: 'text-emerald-600', bg: 'bg-emerald-50', rank: 0 },
    dev:  { label: '开发中', dot: 'bg-amber-400',   text: 'text-amber-600',   bg: 'bg-amber-50',   rank: 1 },
    plan: { label: '规划中', dot: 'bg-slate-300',   text: 'text-slate-500',   bg: 'bg-slate-50',   rank: 2 }
  };

  // 读取 ?id=
  const params = new URLSearchParams(location.search);
  const catId = params.get('id') || 'travel';
  const cat = window.FAMILY_DATA[catId];

  if (!cat) {
    document.body.innerHTML = `
      <div class="min-h-screen flex items-center justify-center p-10 text-center">
        <div>
          <div class="text-6xl mb-4">🤔</div>
          <div class="text-xl font-bold text-slate-700 mb-2">没有找到这个分类</div>
          <a href="./index.html" class="inline-flex items-center gap-1 mt-4 px-4 py-2 rounded-lg bg-sky-500 text-white">
            <i class="ri-arrow-left-line"></i>返回首页
          </a>
        </div>
      </div>`;
    throw new Error('unknown category: ' + catId);
  }

  document.title = `${cat.title} · 暄暄的家`;
  const a = ACCENT[cat.accent] || ACCENT.sky;

  // ---- Hero ----
  document.getElementById('cat-hero').innerHTML = `
    <div class="absolute inset-0 bg-gradient-to-br ${a.grad} opacity-10"></div>
    <div class="absolute -top-10 -left-10 w-72 h-72 rounded-full bg-gradient-to-br ${a.grad} opacity-20 blur-3xl"></div>
    <div class="absolute top-0 right-0 text-[12rem] opacity-10 leading-none select-none pointer-events-none">${cat.emoji}</div>
    <div class="relative max-w-7xl mx-auto">
      <nav class="flex items-center gap-2 text-sm text-slate-500 mb-6">
        <a href="./index.html" class="hover:text-sky-600 transition inline-flex items-center gap-1"><i class="ri-home-4-line"></i>首页</a>
        <i class="ri-arrow-right-s-line"></i>
        <span class="text-slate-700 font-medium">${cat.title}</span>
      </nav>
      <div class="flex items-start gap-5">
        <div class="w-16 h-16 rounded-3xl bg-gradient-to-br ${a.grad} text-white flex items-center justify-center text-3xl shadow-lg shrink-0">
          <i class="${cat.icon}"></i>
        </div>
        <div class="min-w-0">
          <div class="text-sm font-semibold ${a.solid} mb-1">${cat.subtitle}</div>
          <h1 class="text-3xl md:text-5xl font-black mb-3">${cat.title}</h1>
          <p class="text-slate-600 max-w-2xl">${cat.desc}</p>
        </div>
      </div>
    </div>
  `;

  // ---- 顶部分类链接 ----
  const navCats = document.getElementById('nav-cats');
  const mobileCats = document.getElementById('mobile-nav-cats');
  Object.values(window.FAMILY_DATA).forEach(c => {
    const active = c.id === catId;
    const el = document.createElement('a');
    el.href = `./category.html?id=${c.id}`;
    el.className = `transition inline-flex items-center gap-1 ${active ? a.solid + ' font-bold' : 'hover:text-sky-600'}`;
    el.innerHTML = `<span>${c.emoji}</span>${c.title}`;
    navCats.appendChild(el);

    const mb = document.createElement('a');
    mb.href = `./category.html?id=${c.id}`;
    mb.className = `mobile-link py-3 text-center rounded-lg transition flex flex-col items-center gap-0.5 ${active ? a.soft : 'hover:bg-sky-50 hover:text-sky-600'}`;
    mb.innerHTML = `<span class="text-base">${c.emoji}</span><span>${c.title}</span>`;
    mobileCats.appendChild(mb);
  });

  // ---- 渲染逻辑 ----
  const listEl = document.getElementById('item-list');
  const emptyEl = document.getElementById('empty-state');
  const metaEl = document.getElementById('result-meta');

  let state = {
    status: 'all',
    sort: 'date-desc',
    keyword: '',
    view: 'grid'
  };

  function applyFilters() {
    let list = [...cat.items];
    if (state.status !== 'all') list = list.filter(i => i.status === state.status);
    if (state.keyword.trim()) {
      const kw = state.keyword.trim().toLowerCase();
      list = list.filter(i =>
        (i.title || '').toLowerCase().includes(kw) ||
        (i.subtitle || '').toLowerCase().includes(kw) ||
        (i.desc || '').toLowerCase().includes(kw) ||
        (i.tags || []).some(t => t.toLowerCase().includes(kw))
      );
    }
    switch (state.sort) {
      case 'date-desc':  list.sort((x,y) => (y.date||'').localeCompare(x.date||'')); break;
      case 'date-asc':   list.sort((x,y) => (x.date||'').localeCompare(y.date||'')); break;
      case 'title-asc':  list.sort((x,y) => x.title.localeCompare(y.title,'zh')); break;
      case 'title-desc': list.sort((x,y) => y.title.localeCompare(x.title,'zh')); break;
      case 'status':     list.sort((x,y) => (STATUS[x.status]?.rank ?? 9) - (STATUS[y.status]?.rank ?? 9)); break;
    }
    return list;
  }

  function render() {
    const list = applyFilters();
    metaEl.textContent = `共 ${list.length} 项${state.keyword ? `（关键词："${state.keyword}"）` : ''}`;
    if (!list.length) {
      listEl.innerHTML = '';
      emptyEl.classList.remove('hidden');
      return;
    }
    emptyEl.classList.add('hidden');

    if (state.view === 'grid') {
      listEl.className = 'grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5';
      listEl.innerHTML = list.map(renderCard).join('');
    } else {
      listEl.className = 'flex flex-col gap-3';
      listEl.innerHTML = list.map(renderRow).join('');
    }
  }

  function renderTags(tags, accent) {
    if (!tags?.length) return '';
    return tags.map(t =>
      `<span class="inline-flex items-center gap-0.5 px-2 py-0.5 rounded-md text-[11px] font-medium ${accent.soft}">#${t}</span>`
    ).join('');
  }

  function renderCard(it) {
    const s = STATUS[it.status] || STATUS.plan;
    const disabled = it.status !== 'live';
    const href = it.status === 'live' ? it.href : 'javascript:void(0)';
    return `
      <${disabled ? 'div' : 'a'} ${disabled ? '' : `href="${href}"`}
        class="group relative rounded-3xl bg-white border border-slate-100 shadow-sm overflow-hidden transition
               hover:-translate-y-1 hover:shadow-xl hover:ring-4 ${a.ring}
               ${disabled ? 'cursor-not-allowed opacity-90' : 'cursor-pointer'} flex flex-col">
        <div class="relative h-36 bg-gradient-to-br ${a.grad} flex items-center justify-center overflow-hidden">
          <div class="text-7xl group-hover:scale-110 transition select-none">${it.cover || cat.emoji}</div>
          <span class="absolute top-3 left-3 inline-flex items-center gap-1 px-2.5 py-1 rounded-full bg-white/90 backdrop-blur text-[11px] font-semibold ${s.text}">
            <span class="w-1.5 h-1.5 rounded-full ${s.dot}"></span>${s.label}
          </span>
          ${it.date ? `<span class="absolute top-3 right-3 px-2.5 py-1 rounded-full bg-white/90 backdrop-blur text-[11px] font-semibold text-slate-600">${formatDate(it.date)}</span>` : ''}
        </div>
        <div class="p-5 flex-1 flex flex-col">
          <div class="text-xs font-semibold ${a.solid} mb-1">${it.subtitle || ''}</div>
          <div class="text-lg font-black text-slate-800 mb-2">${it.title}</div>
          <p class="text-sm text-slate-500 leading-relaxed mb-3 line-clamp-3 flex-1">${it.desc || ''}</p>
          ${(it.location || it.duration) ? `
            <div class="flex items-center gap-3 text-xs text-slate-500 mb-3">
              ${it.location ? `<span class="inline-flex items-center gap-1"><i class="ri-map-pin-line"></i>${it.location}</span>` : ''}
              ${it.duration ? `<span class="inline-flex items-center gap-1"><i class="ri-time-line"></i>${it.duration}</span>` : ''}
            </div>` : ''}
          <div class="flex flex-wrap gap-1 mb-4">${renderTags(it.tags, a)}</div>
          <div class="flex items-center justify-between pt-3 border-t border-slate-100 text-sm">
            <span class="text-slate-500">${disabled ? '敬请期待' : '点击查看'}</span>
            <span class="${disabled ? 'text-slate-400' : a.solid + ' font-semibold'} inline-flex items-center gap-1 transition group-hover:translate-x-0.5">
              ${disabled ? '🚧' : '查看详情'} ${disabled ? '' : '<i class="ri-arrow-right-line"></i>'}
            </span>
          </div>
        </div>
      </${disabled ? 'div' : 'a'}>
    `;
  }

  function renderRow(it) {
    const s = STATUS[it.status] || STATUS.plan;
    const disabled = it.status !== 'live';
    const href = it.status === 'live' ? it.href : 'javascript:void(0)';
    return `
      <${disabled ? 'div' : 'a'} ${disabled ? '' : `href="${href}"`}
        class="group flex items-center gap-4 p-4 rounded-2xl bg-white border border-slate-100 shadow-sm transition
               hover:-translate-y-0.5 hover:shadow-md hover:ring-2 ${a.ring}
               ${disabled ? 'cursor-not-allowed opacity-90' : 'cursor-pointer'}">
        <div class="w-14 h-14 shrink-0 rounded-2xl bg-gradient-to-br ${a.grad} text-white flex items-center justify-center text-2xl">
          ${it.cover || cat.emoji}
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2 mb-1 flex-wrap">
            <span class="text-base font-bold text-slate-800 truncate">${it.title}</span>
            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded-full text-[11px] font-semibold ${s.text} ${s.bg}">
              <span class="w-1.5 h-1.5 rounded-full ${s.dot}"></span>${s.label}
            </span>
            ${it.date ? `<span class="text-xs text-slate-400">${formatDate(it.date)}</span>` : ''}
          </div>
          <div class="text-sm text-slate-500 truncate">${it.desc || it.subtitle || ''}</div>
          <div class="flex flex-wrap gap-1 mt-2">${renderTags(it.tags, a)}</div>
        </div>
        <div class="hidden sm:block shrink-0 text-slate-400 group-hover:text-slate-700 transition">
          <i class="ri-arrow-right-line text-xl"></i>
        </div>
      </${disabled ? 'div' : 'a'}>
    `;
  }

  function formatDate(s) {
    // 支持 YYYY-MM-DD
    const m = /^(\d{4})-(\d{2})-(\d{2})/.exec(s);
    if (!m) return s;
    return `${m[1]}.${m[2]}.${m[3]}`;
  }

  // ---- 交互绑定 ----
  document.getElementById('status-filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    state.status = btn.dataset.status;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('bg-white','shadow','text-slate-700');
    });
    btn.classList.add('bg-white','shadow','text-slate-700');
    render();
  });

  document.getElementById('sort-select').addEventListener('change', e => {
    state.sort = e.target.value;
    render();
  });

  document.getElementById('search-input').addEventListener('input', e => {
    state.keyword = e.target.value;
    render();
  });

  document.getElementById('view-switch').addEventListener('click', e => {
    const btn = e.target.closest('.view-btn');
    if (!btn) return;
    state.view = btn.dataset.view;
    document.querySelectorAll('.view-btn').forEach(b => {
      b.classList.remove('bg-white','shadow','text-slate-700');
      b.classList.add('text-slate-500');
    });
    btn.classList.remove('text-slate-500');
    btn.classList.add('bg-white','shadow','text-slate-700');
    render();
  });

  // 初次渲染
  render();

  // 年份
  document.getElementById('year').textContent = new Date().getFullYear();

  // 移动菜单
  (function initMobileNav() {
    const toggle = document.getElementById('nav-toggle');
    const menu = document.getElementById('mobile-menu');
    const icon = document.getElementById('nav-icon');
    if (!toggle || !menu) return;
    const open  = () => { menu.classList.remove('hidden'); icon.classList.replace('ri-menu-line','ri-close-line'); };
    const close = () => { menu.classList.add('hidden');    icon.classList.replace('ri-close-line','ri-menu-line'); };
    toggle.addEventListener('click', e => { e.stopPropagation(); menu.classList.contains('hidden') ? open() : close(); });
    menu.addEventListener('click', e => { if (e.target.closest('a')) close(); });
    document.addEventListener('click', e => { if (!menu.contains(e.target) && e.target !== toggle) close(); });
    window.addEventListener('resize', () => { if (window.innerWidth >= 768) close(); });
  })();
</script>

</body>
</html>
